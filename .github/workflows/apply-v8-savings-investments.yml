name: Apply dynamic savings and chart improvements

on:
  push:
    paths:
      - '.github/workflows/apply-v8-savings-investments.yml'
      - 'scripts/apply_v9_dynamic_cash_and_chart.py.xz.b64'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode and apply v9 migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, lzma
          payload = Path('scripts/apply_v9_dynamic_cash_and_chart.py.xz.b64').read_text().strip()
          script = lzma.decompress(base64.b64decode(payload))
          Path('/tmp/apply_v9_dynamic_cash_and_chart.py').write_bytes(script)
          PY
          python -m py_compile /tmp/apply_v9_dynamic_cash_and_chart.py
          python /tmp/apply_v9_dynamic_cash_and_chart.py

      - name: Validate application JavaScript and feature markers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', html, flags=re.S|re.I)
          inline = [s for s in scripts if s.strip()]
          if not inline:
              raise SystemExit('No inline JavaScript found')
          Path('/tmp/financial-planner-v9.js').write_text(inline[-1], encoding='utf-8')
          required = [
              'savingsCashCeiling', 'savingsSweepExcess', 'Excess cash sweep to investments',
              'monthlySpendingRoomPanel', 'buildMonthlySpendingRoom', 'chartTooltip',
              'resetChartZoom', 'setupChartInteractions', 'niceMoneyStep'
          ]
          missing = [item for item in required if item not in html]
          if missing:
              raise SystemExit(f'Missing v9 markers: {missing}')
          ids = re.findall(r'\bid="([^"]+)"', html)
          duplicates = sorted({item for item in ids if ids.count(item) > 1})
          if duplicates:
              raise SystemExit(f'Duplicate HTML ids: {duplicates}')
          PY
          node --check /tmp/financial-planner-v9.js
          grep -q "financial-planner-secure-v9-dynamic-cash-and-chart" service-worker.js

      - name: Commit updated application
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html service-worker.js
          if git diff --cached --quiet; then
            echo 'No app changes were needed.'
            exit 0
          fi
          git commit -m 'Add dynamic cash sweeps, monthly spending room, and chart zoom'
          git push origin HEAD:main
