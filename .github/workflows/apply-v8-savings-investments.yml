name: Apply dynamic savings and visualizations

on:
  push:
    paths:
      - '.github/workflows/apply-v8-savings-investments.yml'
      - 'scripts/apply_v9_dynamic_cash_and_chart.py.xz.b64'
      - 'scripts/apply_v10_monthly_allocation_pie.py.xz.b64'
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    if: github.event_name != 'issues' || github.event.issue.title == 'Run financial planner visualization migration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate migrations
        id: migration
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            python - <<'PY'
          from pathlib import Path
          import base64, lzma
          payloads = [
              ('scripts/apply_v9_dynamic_cash_and_chart.py.xz.b64', '/tmp/apply_v9_dynamic_cash_and_chart.py'),
              ('scripts/apply_v10_monthly_allocation_pie.py.xz.b64', '/tmp/apply_v10_monthly_allocation_pie.py'),
          ]
          for source, target in payloads:
              encoded = Path(source).read_text().strip()
              script = lzma.decompress(base64.b64decode(encoded))
              Path(target).write_bytes(script)
              print(f'Decoded {source} -> {target} ({len(script)} bytes)')
          PY
            python -m py_compile /tmp/apply_v9_dynamic_cash_and_chart.py /tmp/apply_v10_monthly_allocation_pie.py
            python /tmp/apply_v9_dynamic_cash_and_chart.py
            python /tmp/apply_v10_monthly_allocation_pie.py
            python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', html, flags=re.S|re.I)
          inline = [s for s in scripts if s.strip()]
          if not inline:
              raise SystemExit('No inline JavaScript found')
          Path('/tmp/financial-planner-v10.js').write_text(inline[-1], encoding='utf-8')
          required = [
              'savingsCashCeiling', 'savingsSweepExcess', 'Excess cash sweep to investments',
              'monthlySpendingRoomPanel', 'buildMonthlySpendingRoom', 'chartTooltip',
              'resetChartZoom', 'setupChartInteractions', 'niceMoneyStep',
              'monthlyAllocationChart', 'monthlyAllocationLegend',
              'drawMonthlyAllocationChart', 'setupMonthlyAllocationInteractions'
          ]
          missing = [item for item in required if item not in html]
          if missing:
              raise SystemExit(f'Missing visualization markers: {missing}')
          ids = re.findall(r'\bid="([^"]+)"', html)
          duplicates = sorted({item for item in ids if ids.count(item) > 1})
          if duplicates:
              raise SystemExit(f'Duplicate HTML ids: {duplicates}')
          print('All required markers are present and HTML ids are unique.')
          PY
            node --check /tmp/financial-planner-v10.js
            grep -q "financial-planner-secure-v10-monthly-allocation-pie" service-worker.js
          } > /tmp/migration.log 2>&1
          status=$?
          cat /tmp/migration.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Commit updated application
        if: steps.migration.outcome == 'success'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html service-worker.js
          if git diff --cached --quiet; then
            echo 'No app changes were needed.'
            exit 0
          fi
          git commit -m 'Add dynamic cash sweeps, spending room, zoom charts, and monthly allocation pie'
          git push origin HEAD:main

      - name: Report result on trigger issue
        if: always() && github.event_name == 'issues'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MIGRATION_OUTCOME: ${{ steps.migration.outcome }}
        run: |
          {
            if [ "$MIGRATION_OUTCOME" = "success" ]; then
              echo '✅ Financial planner visualization migration completed successfully.'
            else
              echo '❌ Financial planner visualization migration failed.'
            fi
            echo
            echo '```text'
            tail -n 80 /tmp/migration.log 2>/dev/null || echo 'No migration log was produced.'
            echo '```'
          } > /tmp/issue-report.md
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/issue-report.md
          if [ "$MIGRATION_OUTCOME" = "success" ]; then
            gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
          fi

      - name: Fail workflow when migration failed
        if: steps.migration.outcome == 'failure'
        run: exit 1
