name: Apply v8 savings and investments

on:
  push:
    paths:
      - '.github/workflows/apply-v8-savings-investments.yml'
      - 'scripts/apply_v8_savings_investments.py'
      - 'scripts/apply_v8_1_savings_refinements.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply savings migrations
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/apply_v8_savings_investments.py')
          s=p.read_text()
          s=s.replace("...summary.map(e=>({date:e.date,balance:e.runningBalance}))", "...events.map(e=>({date:e.date,balance:e.runningBalance}))")
          p.write_text(s)
          PY
          python scripts/apply_v8_savings_investments.py
          python scripts/apply_v8_1_savings_refinements.py

      - name: Validate application JavaScript and feature markers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html=Path('index.html').read_text(encoding='utf-8')
          scripts=re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',html,flags=re.S|re.I)
          inline=[s for s in scripts if s.strip()]
          if not inline:
              raise SystemExit('No inline JavaScript found')
          Path('/tmp/financial-planner-v8.js').write_text(inline[-1],encoding='utf-8')
          required=['savingsForm','savingsMonthlyTarget','buildSavingsProjection','buildInvestmentProjection','chartModeToggle','copy-income']
          missing=[item for item in required if item not in html]
          if missing:
              raise SystemExit(f'Missing v8 markers: {missing}')
          PY
          node --check /tmp/financial-planner-v8.js
          grep -q "financial-planner-secure-v8-1-savings-refinements" service-worker.js

      - name: Commit updated application
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html service-worker.js
          if git diff --cached --quiet; then
            echo 'No app changes were needed.'
            exit 0
          fi
          git commit -m 'Refine savings growth and copied income dates'
          git push origin HEAD:main
