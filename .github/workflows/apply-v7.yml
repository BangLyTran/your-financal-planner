name: Apply v7 smart planner

on:
  push:
    paths:
      - '.github/workflows/apply-v7.yml'
      - 'scripts/apply_v7_smart_priority_planner.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply migration
        run: python scripts/apply_v7_smart_priority_planner.py
      - name: Validate JavaScript
        run: |
          python -c "from pathlib import Path; import re; h=Path('index.html').read_text(); s=[x for x in re.findall(r'<script(?:\\s[^>]*)?>(.*?)</script>',h,flags=re.S|re.I) if x.strip()]; Path('/tmp/app.js').write_text(s[-1])"
          node --check /tmp/app.js
          grep -q "financial-planner-secure-v7-smart-priority" service-worker.js
      - name: Commit app changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html service-worker.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Make debt planner deadline and priority aware'
          git push origin HEAD:main
