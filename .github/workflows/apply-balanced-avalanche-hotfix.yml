name: Apply balanced avalanche hotfix

on:
  push:
    paths:
      - '.github/workflows/apply-balanced-avalanche-hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply balanced avalanche patch
        shell: bash
        run: |
          cat > /tmp/balanced-avalanche.patch.b64 <<'PATCH64'

PATCH64
          base64 --decode /tmp/balanced-avalanche.patch.b64 > /tmp/balanced-avalanche.patch
          git apply --check /tmp/balanced-avalanche.patch
          git apply /tmp/balanced-avalanche.patch

      - name: Commit updated app
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html service-worker.js
          if git diff --cached --quiet; then
            echo 'No changes were needed.'
            exit 0
          fi
          git commit -m 'Fix and balance debt avalanche planner'
          git push origin HEAD:main
